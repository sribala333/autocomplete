<mat-form-field [appearance]="appearance">
  <mat-label>{{ label }}</mat-label>
  <input
    matInput
    [placeholder]="label"
    [matAutocomplete]="autoCmpt"
    #inputVal
    [formControl]="control"
    (focus)="setItems(inputVal.value)"
    (keyup)="keyUpFunction($event, inputVal.value)"
    (input)="setItems(inputVal.value)"
    (blur)="checVal(inputVal.value)"
    (click)="inputVal.select()"
    [required]="required"
  />
  <!-- <img loading="lazy" src="assets/images/search.png" matSuffix width="18" /> -->
  @if (control?.errors?.required && required) {
    <mat-error>
      {{ label }} is required
    </mat-error>
  }
  @if (control?.errors?.incorrect && checkValid) {
    <mat-error>
      {{ label }} is not valid.
    </mat-error>
  }

  <mat-autocomplete
    #autoCmpt="matAutocomplete"
    [displayWith]="displayDataFn"
    (optionSelected)="emitValues($event)"
  >
    <!-- <mat-option>-------Select {{label}}-------</mat-option> -->
    @for (data of filterList; track trackByFn($index, data)) {
      <mat-option
        [value]="data[refId]"
        class="autocom-option autocom-tr"
      >
        <span [innerHTML]="data[refName] | highlight: inputVal.value:highlightColor"></span>
      </mat-option>
    }
    @if (filterList.length == 0) {
      <mat-option>
        <div class="no-record"><span>No Data Found</span></div>
      </mat-option>
    }
  </mat-autocomplete>
</mat-form-field>
